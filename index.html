<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snap4Ywo</title>
    
    <!-- Для красивого отображения на iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #FFB6C1;  /* Нежный розовый фон */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        h1 {
            font-size: 36px;
            text-align: center;
            margin: 10px 0;
            color: #FFFFFF;
            text-shadow: 2px 2px 4px rgba(255, 105, 180, 0.3);
            font-weight: 600;
            letter-spacing: 1px;
        }
        
        .section {
            background: rgba(255, 255, 255, 0.3);  /* Полупрозрачный белый */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 20px rgba(255, 105, 180, 0.2);
        }
        
        .section-title {
            font-size: 18px;
            margin-bottom: 15px;
            color: #FF1493;  /* Глубокий розовый для заголовков */
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        button {
            background: #FF69B4;  /* Розовый для кнопок */
            color: white;
            border: none;
            padding: 16px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            width: 100%;
            margin: 8px 0;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 4px 10px rgba(255, 105, 180, 0.4);
            transition: all 0.2s ease;
        }
        
        button:active {
            transform: scale(0.98);
            background: #FF1493;  /* Темнее при нажатии */
        }
        
        button.secondary {
            background: #FFB6C1;  /* Светло-розовый */
            color: #FF1493;
        }
        
        .notification-permission {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        .video-container {
            position: relative;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.3);
            margin: 10px 0;
        }
        
        #video {
            width: 100%;
            display: none;
            border-radius: 15px;
        }
        
        #video.active {
            display: block;
        }
        
        .photo-container {
            position: relative;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.3);
            min-height: 200px;
            margin-top: 15px;
            border: 2px dashed #FF69B4;
        }
        
        #myPhoto, #friendPhoto {
            width: 100%;
            display: block;
        }
        
        .placeholder {
            color: #FF69B4;
            text-align: center;
            padding: 40px;
            font-size: 16px;
            font-style: italic;
        }
        
        #status {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            color: #FF1493;
            margin-top: auto;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        .code-display {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            font-size: 40px;
            text-align: center;
            letter-spacing: 8px;
            font-weight: bold;
            color: #FF1493;
            margin: 10px 0;
            border: 2px solid #FF69B4;
        }
        
        input {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid #FF69B4;
            padding: 15px;
            border-radius: 12px;
            color: #FF1493;
            font-size: 17px;
            width: 100%;
            margin: 8px 0;
        }
        
        input::placeholder {
            color: #FFB6C1;
        }
        
        .friend-item {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px;
            border-radius: 12px;
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #FF69B4;
        }
        
        .friend-code {
            font-size: 20px;
            font-weight: bold;
            color: #FF1493;
        }
        
        /* Красивые табы */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab {
            flex: 1;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid #FF69B4;
            color: #FF1493;
        }
        
        .tab.active {
            background: #FF69B4;
            color: white;
        }
        
        /* Красивые эмодзи */
        .heart-icon {
            display: inline-block;
            animation: heartbeat 1.5s ease infinite;
        }
        
        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span class="heart-icon">💕</span> 
            Snap4Ywo 
            <span class="heart-icon">💕</span>
        </h1>
        
        <!-- Уведомления -->
        <div class="notification-permission">
            <span style="color: #FF1493;">🔔 Уведомления</span>
            <button onclick="enableNotifications()" style="width: auto; padding: 10px 20px; margin: 0; background: #FF69B4;">Включить</button>
        </div>
        
        <!-- Вкладки -->
        <div class="tabs">
            <button onclick="showTab('camera')" id="tabCamera" class="tab active">📸 Камера</button>
            <button onclick="showTab('friends')" id="tabFriends" class="tab">👯 Друзья</button>
        </div>
        
        <!-- Вкладка с камерой -->
        <div id="cameraTab">
            <div class="section">
                <div class="section-title">💓 Камера 💓</div>
                
                <button onclick="startCamera()" id="startCameraBtn" class="secondary">📸 Открыть камеру</button>
                
                <div class="video-container">
                    <video id="video" autoplay playsinline></video>
                </div>
                
                <button id="captureBtn" onclick="takePhoto()" style="display: none; background: #FF1493;">📸 Сфоткать</button>
                
                <div class="photo-container">
                    <img id="myPhoto" src="" style="display: none;">
                    <div id="myPlaceholder" class="placeholder">Нет фото</div>
                </div>
            </div>
            
            <div class="section">
                <div class="section-title">📤 Отправить</div>
                
                <select id="friendSelect" style="background: rgba(255,255,255,0.4); color: #FF1493; padding: 15px; border-radius: 12px; width: 100%; margin: 10px 0; border: 2px solid #FF69B4;">
                    <option value="" style="background: #FFB6C1;">Выбери подружку...</option>
                </select>
                
                <button onclick="sendPhotoToFriend()" style="background: #FF69B4;" id="sendBtn" disabled>💕 Отправить 💕</button>
            </div>
        </div>
        
        <!-- Вкладка с друзьями -->
        <div id="friendsTab" style="display: none;">
            <div class="section">
                <div class="section-title">🔗 Твой код</div>
                <div class="code-display" id="myCode">----</div>
                <p style="color: #FF1493; font-size: 14px; text-align: center;">Скажи этот код подружке</p>
            </div>
            
            <div class="section">
                <div class="section-title">➕ Добавить подружку</div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="friendCode" placeholder="Введи 4 цифры" maxlength="4" pattern="\d*" inputmode="numeric">
                    <button onclick="addFriend()" style="width: auto; background: #FF69B4;">➕</button>
                </div>
            </div>
            
            <div class="section">
                <div class="section-title">👯 Мои подружки</div>
                <div id="friendsList"></div>
            </div>
        </div>
        
        <div id="status">💗 Готов к работе 💗</div>
    </div>
    
    <script>
        // ========== ОСНОВНЫЕ ПЕРЕМЕННЫЕ ==========
        let myCode = Math.floor(1000 + Math.random() * 9000);
        document.getElementById('myCode').innerText = myCode;
        
        let myPhoto = null;
        let friends = {};
        let stream = null;
        
        // Загружаем сохраненных друзей
        try {
            let saved = localStorage.getItem('friends_' + myCode);
            if(saved) {
                friends = JSON.parse(saved);
                updateFriendsList();
                updateFriendSelect();
            }
        } catch(e) {}
        
        // ========== УВЕДОМЛЕНИЯ ==========
        function enableNotifications() {
            if ('Notification' in window) {
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        document.getElementById('status').innerHTML = '💗 Уведомления включены! 💗';
                        new Notification('💕 Snap4Ywo 💕', {
                            body: 'Теперь ты будешь видеть фото подружек!'
                        });
                    }
                });
            }
        }
        
        // ========== КАМЕРА ==========
        function startCamera() {
            const video = document.getElementById('video');
            
            navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'user' }
            })
            .then(s => {
                stream = s;
                video.srcObject = s;
                video.classList.add('active');
                document.getElementById('startCameraBtn').style.display = 'none';
                document.getElementById('captureBtn').style.display = 'block';
            })
            .catch(err => {
                alert('Ошибка камеры: ' + err);
            });
        }
        
        function takePhoto() {
            const video = document.getElementById('video');
            const canvas = document.createElement('canvas');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            myPhoto = canvas.toDataURL('image/jpeg', 0.8);
            
            document.getElementById('myPhoto').src = myPhoto;
            document.getElementById('myPhoto').style.display = 'block';
            document.getElementById('myPlaceholder').style.display = 'none';
            
            if(stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            video.classList.remove('active');
            document.getElementById('startCameraBtn').style.display = 'block';
            document.getElementById('captureBtn').style.display = 'none';
            
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('status').innerHTML = '💗 Фото готово! 💗';
        }
        
        // ========== ДРУЗЬЯ ==========
        function addFriend() {
            let code = document.getElementById('friendCode').value;
            
            if(code.length !== 4 || isNaN(code)) {
                alert('Введи 4 цифры');
                return;
            }
            
            if(code === myCode) {
                alert('Это твой код!');
                return;
            }
            
            if(friends[code]) {
                alert('Такая подружка уже есть');
                return;
            }
            
            friends[code] = {
                name: 'Подружка ' + code,
                photos: []
            };
            
            saveFriends();
            updateFriendsList();
            updateFriendSelect();
            
            document.getElementById('friendCode').value = '';
            document.getElementById('status').innerHTML = '💗 Подружка добавлена! 💗';
        }
        
        function updateFriendsList() {
            let html = '';
            
            for(let code in friends) {
                html += `
                    <div class="friend-item">
                        <span class="friend-code">${code}</span>
                        <span style="color: #FF69B4;">${friends[code].photos.length} фото</span>
                        <button onclick="removeFriend('${code}')" style="width: auto; padding: 5px 10px; background: #FF69B4;">✕</button>
                    </div>
                `;
            }
            
            if(html === '') {
                html = '<div class="placeholder">Пока нет подружек</div>';
            }
            
            document.getElementById('friendsList').innerHTML = html;
        }
        
        function updateFriendSelect() {
            let select = document.getElementById('friendSelect');
            let html = '<option value="">Выбери подружку...</option>';
            
            for(let code in friends) {
                html += `<option value="${code}">Подружка ${code}</option>`;
            }
            
            select.innerHTML = html;
        }
        
        function removeFriend(code) {
            delete friends[code];
            saveFriends();
            updateFriendsList();
            updateFriendSelect();
        }
        
        function saveFriends() {
            try {
                localStorage.setItem('friends_' + myCode, JSON.stringify(friends));
            } catch(e) {}
        }
        
        // ========== ОТПРАВКА ФОТО ==========
        function sendPhotoToFriend() {
            let friendCode = document.getElementById('friendSelect').value;
            
            if(!friendCode) {
                alert('Выбери подружку');
                return;
            }
            
            if(!myPhoto) {
                alert('Сначала сфоткай');
                return;
            }
            
            if(!friends[friendCode].photos) {
                friends[friendCode].photos = [];
            }
            
            friends[friendCode].photos.push({
                photo: myPhoto,
                time: new Date().getTime()
            });
            
            saveFriends();
            
            // Отправляем уведомление
            let key = 'notifications_' + friendCode;
            let notifs = [];
            try {
                let saved = localStorage.getItem(key);
                if(saved) notifs = JSON.parse(saved);
            } catch(e) {}
            
            notifs.push({
                from: myCode,
                photo: myPhoto,
                time: new Date().getTime()
            });
            
            try {
                localStorage.setItem(key, JSON.stringify(notifs));
            } catch(e) {}
            
            if (Notification.permission === 'granted') {
                new Notification('💕 Новое фото! 💕', {
                    body: 'От подружки с кодом ' + myCode,
                    image: myPhoto
                });
            }
            
            document.getElementById('status').innerHTML = '💗 Фото отправлено подружке ' + friendCode + '! 💗';
        }
        
        // ========== ПРОВЕРКА НОВЫХ ФОТО ==========
        function checkForNewPhotos() {
            let key = 'notifications_' + myCode;
            
            try {
                let saved = localStorage.getItem(key);
                if(saved) {
                    let notifs = JSON.parse(saved);
                    
                    notifs.forEach(notif => {
                        let container = document.getElementById('friendPhotos');
                        if(container) {
                            let timeAgo = Math.floor((new Date().getTime() - notif.time) / 1000);
                            let timeText = timeAgo < 60 ? `${timeAgo} сек` : `${Math.floor(timeAgo/60)} мин`;
                            
                            let html = `
                                <div style="margin: 10px 0; padding: 15px; background: rgba(255,255,255,0.3); backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid #FF69B4;">
                                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px; color: #FF1493;">
                                        <span>💗 От подружки ${notif.from}</span>
                                        <span>${timeText} назад</span>
                                    </div>
                                    <img src="${notif.photo}" style="width: 100%; border-radius: 12px;">
                                </div>
                            `;
                            
                            container.innerHTML = html + (container.innerHTML || '');
                        }
                        
                        if (Notification.permission === 'granted') {
                            new Notification('💕 Получено фото! 💕', {
                                body: 'От подружки ' + notif.from,
                                image: notif.photo
                            });
                        }
                    });
                    
                    localStorage.removeItem(key);
                }
            } catch(e) {}
        }
        
        // ========== НАВИГАЦИЯ ==========
        function showTab(tab) {
            document.getElementById('tabCamera').classList.remove('active');
            document.getElementById('tabFriends').classList.remove('active');
            
            if(tab === 'camera') {
                document.getElementById('tabCamera').classList.add('active');
                document.getElementById('cameraTab').style.display = 'block';
                document.getElementById('friendsTab').style.display = 'none';
            } else {
                document.getElementById('tabFriends').classList.add('active');
                document.getElementById('cameraTab').style.display = 'none';
                document.getElementById('friendsTab').style.display = 'block';
            }
        }
        
        // ========== ПРОВЕРКА КАЖДЫЕ 2 СЕКУНДЫ ==========
        setInterval(checkForNewPhotos, 2000);
        
        // ========== СОХРАНЕНИЕ ==========
        window.addEventListener('beforeunload', () => {
            saveFriends();
        });
    </script>
</body>
</html>
